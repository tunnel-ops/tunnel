name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME}"
          go build -ldflags="${LDFLAGS}" -o tunnel_${{ matrix.goos }}_${{ matrix.goarch }} ./cmd/tunnel
          go build -ldflags="${LDFLAGS}" -o requests-proxy_${{ matrix.goos }}_${{ matrix.goarch }} ./cmd/proxy

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            tunnel_${{ matrix.goos }}_${{ matrix.goarch }}
            requests-proxy_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum tunnel_* requests-proxy_* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            tunnel_*
            requests-proxy_*
            checksums.txt
          generate_release_notes: true
